# Kotaemon — persistent Docker Compose stack
#
# Quick start:
#   cp .env.example .env          # edit API keys / model names
#   docker compose up -d --build
#   open http://localhost:7860
#
# With bundled Ollama (local LLM on the Docker network):
#   docker compose --profile ollama up -d --build
#
# Data survives container restarts and `docker compose down`
# (removed only with `docker compose down -v` or `docker volume rm`).

name: kotaemon

services:
  kotaemon:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${KOTAEMON_BUILD_TARGET:-full}
      args:
        REQUIREMENTS_FILE: ${REQUIREMENTS_FILE:-requirements_gerageragera39.txt}
        TORCH_INDEX_URL: ${TORCH_INDEX_URL:-https://download.pytorch.org/whl/cpu}
    image: kotaemon:${KOTAEMON_BUILD_TARGET:-full}
    container_name: kotaemon-app
    restart: unless-stopped
    ports:
      - "${GRADIO_HOST_PORT:-7860}:7860"
    env_file:
      - path: .env
        required: false
    environment:
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
      # Ollama on host: host.docker.internal. With --profile ollama set KH_OLLAMA_URL=http://ollama:11434/v1/ in .env
      KH_OLLAMA_URL: ${KH_OLLAMA_URL:-http://host.docker.internal:11434/v1/}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Bind mount: data on host (default, easy backup). See compose.override.example.yml for named volume.
      - ${KOTAEMON_DATA_DIR:-./ktem_app_data}:/app/ktem_app_data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          ".venv/bin/python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:7860', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    networks:
      - kotaemon-net

  # Optional: Ollama with persistent model storage (enable: --profile ollama)
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    container_name: kotaemon-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - kotaemon-net
    # Uncomment for NVIDIA GPU (requires NVIDIA Container Toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # Optional: local cross-encoder reranker (enable: --profile reranker)
  reranker:
    profiles: ["reranker"]
    image: ghcr.io/huggingface/text-embeddings-inference:latest
    container_name: kotaemon-reranker
    restart: unless-stopped
    command: --model-id BAAI/bge-reranker-v2-m3
    ports:
      - "${TEI_HOST_PORT:-8080}:80"
    networks:
      - kotaemon-net
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

networks:
  kotaemon-net:
    driver: bridge

volumes:
  # Used by profile `ollama` and optional named app data (see compose.override.example)
  ollama_models:
  kotaemon_app_data:
